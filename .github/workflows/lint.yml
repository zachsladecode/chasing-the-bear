name: Lint Blog Posts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint Markdown style
        run: npm run lint:md

      - name: Lint post content
        run: npm run lint:posts

      - name: Build (validates Zod frontmatter schema)
        run: npm run build
